name: Dependency Cool-Down Rescan

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log decisions but skip gh run rerun"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  actions: write
  statuses: read

jobs:
  rescan:
    uses: j7an/shared-workflows/.github/workflows/cooldown-rescan.yml@f59942427bc49f29363f889f1365a77303f5a76f # v2.5.3
    with:
      dry_run: ${{ inputs.dry_run || false }}
