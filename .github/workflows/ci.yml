name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-lockfile:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv lock
      - name: Commit updated lockfile
        id: commit
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.head_ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if git diff --quiet uv.lock; then
            echo "No lockfile changes"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base64 -w0 uv.lock > "$RUNNER_TEMP/uv.lock.b64"
          HEAD_OID=$(git rev-parse HEAD)
          # shellcheck disable=SC2016
          jq -n \
            --arg repo "$REPOSITORY" \
            --arg branch "$HEAD_REF" \
            --arg oid "$HEAD_OID" \
            --rawfile contents "$RUNNER_TEMP/uv.lock.b64" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  expectedHeadOid: $oid,
                  message: { headline: "deps: update uv.lock" },
                  fileChanges: { additions: [ { path: "uv.lock", contents: $contents } ] }
                }
              }
            }' > "$RUNNER_TEMP/commit.json"
          RESPONSE=$(gh api graphql --input "$RUNNER_TEMP/commit.json")
          if [ -z "$(printf '%s' "$RESPONSE" | jq -r '.data.createCommitOnBranch.commit.oid // empty')" ]; then
            echo "::error::createCommitOnBranch did not create a commit. Response: $RESPONSE"
            exit 1
          fi
          echo "committed=true" >> "$GITHUB_OUTPUT"

  lint:
    needs: [update-lockfile]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Block on lockfile repair failure
        if: ${{ needs.update-lockfile.result == 'failure' }}
        shell: bash
        run: |
          echo "::error::update-lockfile failed to repair uv.lock - run 'uv lock' locally and push." && exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.update-lockfile.outputs.committed == 'true' && github.head_ref || '' }}
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Ruff check
        run: uv run ruff check src/ tests/

  typecheck:
    needs: [update-lockfile]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Block on lockfile repair failure
        if: ${{ needs.update-lockfile.result == 'failure' }}
        shell: bash
        run: |
          echo "::error::update-lockfile failed to repair uv.lock - run 'uv lock' locally and push." && exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.update-lockfile.outputs.committed == 'true' && github.head_ref || '' }}
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
      - name: Mypy
        run: uv run mypy src/dep_rank/

  test:
    needs: [update-lockfile]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Block on lockfile repair failure
        if: ${{ needs.update-lockfile.result == 'failure' }}
        shell: bash
        run: |
          echo "::error::update-lockfile failed to repair uv.lock - run 'uv lock' locally and push." && exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.update-lockfile.outputs.committed == 'true' && github.head_ref || '' }}
          persist-credentials: false
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Pytest
        run: uv run pytest
      - name: Diff coverage
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run diff-cover coverage.xml --fail-under=80 --compare-branch="origin/$BASE_REF"

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          allow-dependencies-licenses: pkg:githubactions/trufflesecurity/trufflehog
          comment-summary-in-pr: on-failure
